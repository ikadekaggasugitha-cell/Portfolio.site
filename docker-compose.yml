services:
  portfolio-nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: portfolio-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-network
      - backend-network
    depends_on:
      - portfolio-api
      - portfolio-next
    restart: unless-stopped

  portfolio-api:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: portfolio-api
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - backend-network
      - database-network
    depends_on:
      portfolio-mysql:
        condition: service_healthy
      portfolio-redis:
        condition: service_started
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: portfolio-mysql
      DB_USERNAME: portfolio_user
      DB_PASSWORD: portfolio_password
      REDIS_HOST: portfolio-redis
      REDIS_CLIENT: phpredis
      MAIL_HOST: portfolio-mailpit
      SESSION_DRIVER: redis
      CACHE_STORE: redis

  portfolio-next:
    build:
      context: ./frontend
      dockerfile: ../docker/next/Dockerfile
    container_name: portfolio-next
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - frontend-network
    restart: unless-stopped
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

  portfolio-mysql:
    image: mysql:8.0
    container_name: portfolio-mysql
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - database-network
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: portfolio
      MYSQL_USER: portfolio_user
      MYSQL_PASSWORD: portfolio_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  portfolio-redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-network
    restart: unless-stopped

  portfolio-mailpit:
    image: axllent/mailpit:latest
    container_name: portfolio-mailpit
    # ports:
    #   - "1025:1025"
    #   - "8025:8025"
    networks:
      - backend-network
    restart: unless-stopped

  portfolio-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: portfolio-worker
    volumes:
      - ./backend:/var/www/html
    networks:
      - backend-network
      - database-network
    depends_on:
      - portfolio-api
      - portfolio-mysql
      - portfolio-redis
    command: php artisan queue:work
    restart: unless-stopped

  portfolio-scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: portfolio-scheduler
    volumes:
      - ./backend:/var/www/html
    networks:
      - backend-network
      - database-network
    depends_on:
      - portfolio-api
      - portfolio-mysql
      - portfolio-redis
    command: php artisan schedule:work
    restart: unless-stopped

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
  database-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
